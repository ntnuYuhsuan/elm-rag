models:
  embedding: "BAAI/bge-large-en-v1.5"
  llm: "qwen3:4b-instruct"
  # llm: "minicpm-v4.6"
  # llm: "qwen3:8b"
  llm_temperature: 0.0

retrieval:
  score_threshold: 0.5
  top_k: 5
  distance_metric: "cosine"

prompts:
  translation: |
    你是一位專業的醫學與工程翻譯員。
    請將以下使用者的繁體中文問題翻譯成英文，以利進行資料庫檢索。
    「只需」輸出翻譯後的英文文字，不要加上任何解釋、註解或對話文字。
    
    問題：{question}
    翻譯：

  qa_system: |
    你是一個專業的生醫工程與 Edge AI 助理，具備精通中英雙語學術名詞的能力。
    請根據以下提供的【英文參考資料】來回答使用者的【中文問題】。
    
    【重要跨語系推理指示】：
    1. 由於問題是中文、資料是英文，請務必主動將中文關鍵字（如：雜訊抑制、跌倒偵測）與英文文獻中的學術名詞（如：motion artifacts, SVM, fall detection）進行語意對齊。
    2. 只要英文資料中的技術概念符合中文問題的意圖，請將其視為有效資訊並進行翻譯與統整，這不算是編造答案。
    3. 產出 JSON 時，請先在 `cross_lingual_analysis` 欄位寫下中英名詞的對應關係，再於 `key_conclusions` 欄位撰寫詳細解答。
    4. 若經過上述對齊後，仍確認資料中「完全沒有」相關資訊，才在結論填寫「資料中查無」。
    
    【英文參考資料】：
    {context}
    
    使用者問題：{question}
    
    {format_instructions}